<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-repeat</title>
    <style>
        body {
            margin: 0;
        }
        .box {
            width: 100px;
            height: 150px;
            background-image: url("aya.jpeg");
            background-repeat: repeat-x;
            background-size: auto 150px;
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
